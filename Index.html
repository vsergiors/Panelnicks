<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HySquare Panel</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
}

.nav button {
    margin-left: 10px;
}

/* SECCIONES */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* UI */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin-top: 15px;
}

input, button, select {
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: purple;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="nav">
    <div>
        <button onclick="go('home')">Home</button>
        <button onclick="go('search')">Buscar</button>
        <button onclick="go('profile')">Perfil</button>
        <button onclick="go('admin')" id="adminBtn" style="display:none;">Admin</button>
    </div>

    <div>
        <button onclick="go('auth')" id="loginBtn">Login</button>
        <button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</div>

<!-- SECCIONES -->

<!-- HOME -->
<div id="home" class="section active">
    <h1>Anuncios</h1>
    <div id="anuncios"></div>
</div>

<!-- AUTH -->
<div id="auth" class="section">
    <h2>Login / Register</h2>
    <input id="emailInput" placeholder="Correo"><br>
    <input id="passInput" type="password" placeholder="Contraseña"><br>
    <input id="usernameInput" placeholder="Nick MC"><br>
    <input id="displayNameInput" placeholder="Nombre visible"><br>
    <label><input type="checkbox" id="showEmailCheck"> Mostrar email</label><br>
    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Login</button>
</div>

<!-- SEARCH -->
<div id="search" class="section">
    <h2>Buscar usuarios</h2>
    <input id="searchInput" placeholder="Nick o correo"><br>
    <button onclick="buscar()">Buscar</button>
    <div id="searchResults"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <h2>Mi Perfil</h2>
    <input id="newDisplayName" placeholder="Nuevo nombre visible"><br>
    <input id="newUsername" placeholder="Nuevo nick MC"><br>
    <button onclick="updateProfile()">Guardar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
    <h2>Panel Admin</h2>
    <h3>Cambiar rango de usuario</h3>
    <input id="targetUid" placeholder="UID usuario"><br>
    <select id="newRank">
        <option>USER</option>
        <option>OWNER</option>
    </select>
    <button onclick="setRank()">Cambiar rango</button>

    <h3>Crear anuncio</h3>
    <input id="adTitle" placeholder="Título anuncio"><br>
    <input id="adContent" placeholder="Contenido anuncio"><br>
    <button onclick="crearAnuncio()">Crear anuncio</button>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROJECT.firebaseapp.com",
    projectId: "TU_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* NAV + SECCIONES */
function go(sectionId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
}

/* AUTH FUNCTIONS */
async function register() {
    const email = emailInput.value.trim();
    const pass = passInput.value.trim();
    const username = usernameInput.value.trim();
    const displayName = displayNameInput.value.trim();
    const showEmail = showEmailCheck.checked;

    if(!email || !pass || !username) return alert("Completa todos los campos");

    const userCred = await auth.createUserWithEmailAndPassword(email, pass);

    await db.collection("users").doc(userCred.user.uid).set({
        username,
        displayName,
        email,
        showEmail,
        rank: "USER",
        createdAt: Date.now()
    });

    alert("Cuenta creada");
    go('home');
}

async function login() {
    await auth.signInWithEmailAndPassword(emailInput.value, passInput.value);
    go('home');
}

function logout() {
    auth.signOut();
    go('auth');
}

/* UI GLOBAL */
auth.onAuthStateChanged(async user => {
    if(!user) {
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        adminBtn.style.display = 'none';
        return;
    }
    loginBtn.style.display = 'none';
    logoutBtn.style.display = 'inline-block';

    const doc = await db.collection("users").doc(user.uid).get();
    window.currentUserData = doc.data();
    if(doc.data().rank === "OWNER") adminBtn.style.display = 'inline-block';

    loadAnuncios();
});

/* CARGAR ANUNCIOS */
async function loadAnuncios() {
    const snap = await db.collection("anuncios").orderBy("createdAt","desc").get();
    anuncios.innerHTML = "";
    snap.forEach(doc => {
        const a = doc.data();
        anuncios.innerHTML += `<div class="card"><h3>${a.title}</h3><p>${a.content}</p></div>`;
    });
}

/* BUSCAR USUARIOS */
async function buscar() {
    const q = searchInput.value.trim();
    let snap;
    if(q.includes("@")) {
        snap = await db.collection("users").where("email","==",q).get();
    } else {
        snap = await db.collection("users").where("username","==",q).get();
    }
    searchResults.innerHTML = "";
    snap.forEach(doc => {
        const u = doc.data();
        searchResults.innerHTML += `<div class="card">
            <b>${u.displayName}</b> (${u.username})<br>
            ${u.showEmail ? u.email : ""}
        </div>`;
    });
}

/* PERFIL */
async function updateProfile() {
    const user = auth.currentUser;
    await db.collection("users").doc(user.uid).update({
        displayName: newDisplayName.value,
        username: newUsername.value
    });
    alert("Perfil actualizado");
}

/* ADMIN */
async function setRank() {
    await db.collection("users").doc(targetUid.value).update({
        rank: newRank.value
    });
    alert("Rango actualizado");
}

async function crearAnuncio() {
    await db.collection("anuncios").add({
        title: adTitle.value,
        content: adContent.value,
        createdAt: Date.now()
    });
    alert("Anuncio creado");
    loadAnuncios();
}
</script>

</body>
</html>
